<!-- Micro-interactions Script -->
<script>
        const commandCenter = document.getElementById('command-center');
        const searchInput = document.getElementById('command-search');

        function toggleCommandCenter() {
            const isHidden = commandCenter.classList.contains('hidden');
            if (isHidden) {
                commandCenter.classList.remove('hidden');
                commandCenter.classList.add('flex');
                setTimeout(() => searchInput.focus(), 50);
            } else {
                commandCenter.classList.add('hidden');
                commandCenter.classList.remove('flex');
            }
        }

        // Global key listeners
        window.addEventListener('keydown', (e) => {
            // CMD/CTRL + K
            if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
                e.preventDefault();
                toggleCommandCenter();
            }
            // Escape to close
            if (e.key === 'Escape') {
                commandCenter.classList.add('hidden');
                commandCenter.classList.remove('flex');
            }
        });

        // Background Animation (Simulated Atmosphere)
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;

        });
